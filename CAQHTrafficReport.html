<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CAQH Traffic Report</title>
<style>
  :root {
    --bg: #f4f6f9;
    --card: #ffffff;
    --border: #d8dee6;
    --text: #1f2a37;
    --muted: #5b6776;
    --accent: #2c5f8a;
    --accent-dark: #1f3d5c;
    --blue: #cfe8fb;
    --blue-dark: #14517d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
  }
  header {
    background: var(--accent-dark);
    color: #39ff14;
    padding: 16px 24px;
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .meta { font-size: 12px; opacity: 0.85; margin-top: 4px; }
  main { padding: 16px 24px 32px; }
  .kpis {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .kpi {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
  }
  .kpi .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi .value { font-size: 22px; font-weight: 600; margin-top: 2px; color: var(--accent-dark); }
  .filters {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: end;
  }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .field select, .field input {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 8px;
    font-size: 13px;
    background: #fff;
    min-width: 120px;
  }
  .field input[type=date] { min-width: 140px; }
  button {
    background: var(--accent);
    color: #fff;
    border: 0;
    border-radius: 4px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 13px;
  }
  button.secondary { background: #fff; color: var(--accent); border: 1px solid var(--accent); }
  table {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    border-collapse: separate;
    border-spacing: 0;
    overflow: hidden;
  }
  thead { background: var(--accent); color: #39ff14; position: sticky; top: 0; z-index: 1; }
  th {
    text-align: left;
    padding: 6px 8px;
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  th .arrow { opacity: 0.5; font-size: 10px; margin-left: 3px; }
  th.sort-asc .arrow, th.sort-desc .arrow { opacity: 1; }
  td {
    padding: 4px 8px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    white-space: nowrap;
  }
  table { width: auto; min-width: 0; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  tr:hover td { background: #f8fafc; }
  .pager { display: flex; align-items: center; gap: 12px; margin-top: 12px; justify-content: flex-end; font-size: 13px; color: var(--muted); }
  .empty { padding: 24px; text-align: center; color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>CAQH Traffic Report</h1>
  <div class="meta">Generated 2026-07-21 07:30 &middot; sqlutilmine3 / CAQH3 &middot; loads since 2026-01-01 &middot; 0 rows total</div>
</header>
<main>
  <section class="kpis">
    <div class="kpi"><div class="label">Total Rows</div><div class="value" id="kpi-rows">&mdash;</div></div>
    <div class="kpi"><div class="label">Clients</div><div class="value" id="kpi-clients">&mdash;</div></div>
    <div class="kpi"><div class="label">Reporting Entities</div><div class="value" id="kpi-reid">&mdash;</div></div>
    <div class="kpi"><div class="label">Total File Count</div><div class="value" id="kpi-count">&mdash;</div></div>
    <div class="kpi"><div class="label">Latest Load</div><div class="value" id="kpi-latest">&mdash;</div></div>
  </section>

  <section class="filters">
    <div class="field">
      <label for="f-client">Client</label>
      <select id="f-client"><option value="">All clients</option></select>
    </div>
    <div class="field">
      <label for="f-reid">Reporting Entity</label>
      <select id="f-reid"><option value="">All</option></select>
    </div>
    <div class="field">
      <label for="f-prod">Prodctrlnum</label>
      <input type="text" id="f-prod" placeholder="contains&hellip;">
    </div>
    <div class="field">
      <label for="f-filename">File Name</label>
      <input type="text" id="f-filename" placeholder="contains&hellip;">
    </div>
    <div class="field">
      <label for="f-exfrom">Extracted From</label>
      <input type="date" id="f-exfrom">
    </div>
    <div class="field">
      <label for="f-exto">Extracted To</label>
      <input type="date" id="f-exto">
    </div>
    <div class="field">
      <label for="f-ldfrom">Loaded From</label>
      <input type="date" id="f-ldfrom">
    </div>
    <div class="field">
      <label for="f-ldto">Loaded To</label>
      <input type="date" id="f-ldto">
    </div>
    <button class="secondary" id="btn-reset">Reset</button>
  </section>

  <table id="grid">
    <thead>
      <tr>
        <th data-key="reid">Reporting Entity<span class="arrow">&#8597;</span></th>
        <th data-key="prod">Prodctrlnum<span class="arrow">&#8597;</span></th>
        <th data-key="client">Client<span class="arrow">&#8597;</span></th>
        <th data-key="filename">File Name<span class="arrow">&#8597;</span></th>
        <th data-key="extracted">Date Extracted<span class="arrow">&#8597;</span></th>
        <th data-key="loaded">Date Loaded<span class="arrow">&#8597;</span></th>
        <th data-key="count" class="num">File Count<span class="arrow">&#8597;</span></th>
      </tr>
    </thead>
    <tbody id="grid-body"></tbody>
  </table>
  <div class="pager">
    <span id="pager-info"></span>
    <button class="secondary" id="pg-prev">&laquo; Prev</button>
    <button class="secondary" id="pg-next">Next &raquo;</button>
  </div>
</main>

<script type="application/json" id="data">[]</script>
<script>
(function() {
  const ROWS = JSON.parse(document.getElementById('data').textContent);
  const PAGE_SIZE = 100;
  let state = {
    client: '', reid: '', prod: '', filename: '',
    exfrom: '', exto: '', ldfrom: '', ldto: '',
    sortKey: 'loaded', sortDir: 'desc', page: 0,
  };

  const $ = (id) => document.getElementById(id);
  const fmtInt = (v) => (v == null ? '' : v.toLocaleString('en-US'));

  // Populate Client + Reporting Entity dropdowns from data.
  const clients = [...new Set(ROWS.map(r => r.client))].sort();
  const reids = [...new Set(ROWS.map(r => r.reid))].sort((a, b) => Number(a) - Number(b));
  for (const c of clients) {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    $('f-client').appendChild(opt);
  }
  for (const r of reids) {
    const opt = document.createElement('option');
    opt.value = r; opt.textContent = r;
    $('f-reid').appendChild(opt);
  }

  function applyFilters() {
    const prodQ = state.prod.trim().toLowerCase();
    const fnQ = state.filename.trim().toLowerCase();
    return ROWS.filter(r => {
      if (state.client && r.client !== state.client) return false;
      if (state.reid && r.reid !== state.reid) return false;
      if (prodQ && r.prod.toLowerCase().indexOf(prodQ) === -1) return false;
      if (fnQ && r.filename.toLowerCase().indexOf(fnQ) === -1) return false;
      // Date-only comparison; loaded carries a time component so slice to 10.
      if (state.exfrom && (!r.extracted || r.extracted < state.exfrom)) return false;
      if (state.exto && (!r.extracted || r.extracted > state.exto)) return false;
      const ld = r.loaded ? r.loaded.slice(0, 10) : '';
      if (state.ldfrom && (!ld || ld < state.ldfrom)) return false;
      if (state.ldto && (!ld || ld > state.ldto)) return false;
      return true;
    });
  }

  function sortRows(rows) {
    const k = state.sortKey;
    const dir = state.sortDir === 'asc' ? 1 : -1;
    return rows.slice().sort((a, b) => {
      let av = a[k], bv = b[k];
      if (k === 'count' || k === 'prod' || k === 'reid') {
        av = Number(av); bv = Number(bv);
      }
      if (av == null) av = '';
      if (bv == null) bv = '';
      if (av < bv) return -1 * dir;
      if (av > bv) return  1 * dir;
      return 0;
    });
  }

  function render() {
    const filtered = applyFilters();
    const sorted = sortRows(filtered);

    // KPIs
    let totalCount = 0, latest = '';
    const cset = new Set(), rset = new Set();
    for (const r of filtered) {
      totalCount += r.count || 0;
      cset.add(r.client);
      rset.add(r.reid);
      if (r.loaded && r.loaded > latest) latest = r.loaded;
    }
    $('kpi-rows').textContent = filtered.length.toLocaleString();
    $('kpi-clients').textContent = cset.size.toLocaleString();
    $('kpi-reid').textContent = rset.size.toLocaleString();
    $('kpi-count').textContent = totalCount.toLocaleString();
    $('kpi-latest').textContent = latest ? latest.slice(0, 10) : '—';

    // Pagination
    const pageCount = Math.max(1, Math.ceil(sorted.length / PAGE_SIZE));
    if (state.page >= pageCount) state.page = pageCount - 1;
    if (state.page < 0) state.page = 0;
    const start = state.page * PAGE_SIZE;
    const slice = sorted.slice(start, start + PAGE_SIZE);

    // Body
    const body = $('grid-body');
    body.innerHTML = '';
    if (slice.length === 0) {
      const tr = document.createElement('tr');
      tr.innerHTML = '<td colspan="7" class="empty">No rows match the current filters.</td>';
      body.appendChild(tr);
    } else {
      const esc = (s) => (s == null ? '' : String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'));
      for (const r of slice) {
        const tr = document.createElement('tr');
        tr.innerHTML =
          '<td>' + esc(r.reid) + '</td>' +
          '<td>' + esc(r.prod) + '</td>' +
          '<td>' + esc(r.client) + '</td>' +
          '<td>' + esc(r.filename) + '</td>' +
          '<td>' + esc(r.extracted) + '</td>' +
          '<td>' + esc(r.loaded) + '</td>' +
          '<td class="num">' + fmtInt(r.count) + '</td>';
        body.appendChild(tr);
      }
    }

    // Sort indicators
    for (const th of document.querySelectorAll('th[data-key]')) {
      th.classList.remove('sort-asc', 'sort-desc');
      const arrow = th.querySelector('.arrow');
      if (th.dataset.key === state.sortKey) {
        th.classList.add('sort-' + state.sortDir);
        arrow.textContent = state.sortDir === 'asc' ? '▲' : '▼';
      } else {
        arrow.textContent = '↕';
      }
    }

    // Pager
    $('pager-info').textContent = sorted.length === 0
      ? '0 rows'
      : (start + 1).toLocaleString() + '–' + (start + slice.length).toLocaleString() + ' of ' + sorted.length.toLocaleString();
  }

  function bindFilters() {
    const ids = ['f-client', 'f-reid', 'f-prod', 'f-filename', 'f-exfrom', 'f-exto', 'f-ldfrom', 'f-ldto'];
    const keys = ['client', 'reid', 'prod', 'filename', 'exfrom', 'exto', 'ldfrom', 'ldto'];
    ids.forEach((id, i) => {
      $(id).addEventListener('input', () => {
        state[keys[i]] = $(id).value;
        state.page = 0;
        render();
      });
    });
    $('btn-reset').addEventListener('click', () => {
      ids.forEach(id => $(id).value = '');
      Object.assign(state, { client: '', reid: '', prod: '', filename: '', exfrom: '', exto: '', ldfrom: '', ldto: '', page: 0 });
      render();
    });
    document.querySelectorAll('th[data-key]').forEach(th => {
      th.addEventListener('click', () => {
        const k = th.dataset.key;
        if (state.sortKey === k) {
          state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          state.sortKey = k;
          state.sortDir = (k === 'count' || k === 'loaded' || k === 'extracted') ? 'desc' : 'asc';
        }
        render();
      });
    });
    $('pg-prev').addEventListener('click', () => { state.page--; render(); });
    $('pg-next').addEventListener('click', () => { state.page++; render(); });
  }

  bindFilters();
  render();
})();
</script>
</body>
</html>
