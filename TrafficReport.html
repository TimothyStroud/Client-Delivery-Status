<script>
(function () {
  const DATA = JSON.parse(document.getElementById('data').textContent);
  const MONTHS = DATA.months;                 // newest first
  const ROWS = DATA.rows;
  const CATS = ['All', 'PI', 'Subro', 'Rx', 'Rx Med'];
  const MNAME = ['', 'Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let state = { cat: 'All', view: 'dates', search: '', collapsed: new Set() };

  const $ = (id) => document.getElementById(id);
  const esc = (s) => (s == null ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));

  function fmtDate(s) {
    if (!s) return '';
    const p = s.slice(0, 10).split('-');
    if (p.length < 3) return '';
    return (+p[1]) + '/' + (+p[2]) + '/' + p[0];
  }

  // Build tab buttons
  CATS.forEach(c => {
    const b = document.createElement('button');
    b.textContent = c; b.dataset.cat = c;
    if (c === state.cat) b.className = 'active';
    b.addEventListener('click', () => { state.cat = c; syncSeg('tabs', 'cat'); render(); });
    $('tabs').appendChild(b);
  });
  function syncSeg(segId, key) {
    for (const b of $(segId).children)
      b.classList.toggle('active', (b.dataset.cat || b.dataset.view) === state[key]);
  }
  for (const b of $('views').children)
    b.addEventListener('click', () => { state.view = b.dataset.view; syncSeg('views', 'view'); render(); });
  $('search').addEventListener('input', () => { state.search = $('search').value; render(); });
  $('toggle-all').addEventListener('click', () => {
    const groups = currentGroups();
    if (state.collapsed.size < groups.length) groups.forEach(g => state.collapsed.add(g.parent));
    else state.collapsed.clear();
    render();
  });

  function filteredRows() {
    const q = state.search.trim().toLowerCase();
    return ROWS.filter(r => {
      if (state.cat !== 'All' && !r.cats.includes(state.cat)) return false;
      if (q && r.client.toLowerCase().indexOf(q) === -1 && r.parent.toLowerCase().indexOf(q) === -1) return false;
      return true;
    });
  }

  function currentGroups() {
    const byParent = {};
    for (const r of filteredRows()) (byParent[r.parent] = byParent[r.parent] || []).push(r);
    return Object.keys(byParent).sort((a, b) => a.toLowerCase() < b.toLowerCase() ? -1 : 1)
      .map(parent => ({ parent, rows: byParent[parent].slice().sort((a, b) => a.client.toLowerCase() < b.client.toLowerCase() ? -1 : 1) }));
  }

  function renderHead() {
    const head = $('head');
    if (state.view === 'dates') {
      head.innerHTML = '<tr class="colhdr"><th class="cli">Client</th>'
        + '<th class="date">Max PayDate Loaded</th><th class="date">Max PayDate Certified</th>'
        + '<th class="date">Max Cert Date</th></tr>';
      return;
    }
    // certs: two header rows (year spans + month numbers)
    let yr = '<tr><th class="cli" rowspan="2">Client</th>';
    let i = 0;
    while (i < MONTHS.length) {
      let j = i; while (j < MONTHS.length && MONTHS[j].y === MONTHS[i].y) j++;
      yr += '<th class="yr" colspan="' + (j - i) + '">' + MONTHS[i].y + '</th>';
      i = j;
    }
    yr += '</tr>';
    let mo = '<tr>';
    for (const mk of MONTHS) mo += '<th class="num" title="' + MNAME[mk.m] + ' ' + mk.y + '">' + mk.m + '</th>';
    mo += '</tr>';
    head.innerHTML = yr + mo;
  }

  function render() {
    renderHead();
    const groups = currentGroups();
    const body = $('body');
    const ncol = state.view === 'dates' ? 3 : MONTHS.length;
    body.innerHTML = '';

    if (groups.length === 0) {
      body.innerHTML = '<tr><td class="empty" colspan="' + (ncol + 1) + '">No clients match.</td></tr>';
      $('toggle-all').textContent = 'Collapse all';
      return;
    }

    let html = '';
    for (const g of groups) {
      const collapsed = state.collapsed.has(g.parent);
      html += '<tr class="grp" data-p="' + esc(g.parent) + '"><td class="cli">'
        + '<span class="tri">' + (collapsed ? '▸' : '▾') + '</span>' + esc(g.parent) + '</td>'
        + '<td colspan="' + ncol + '"></td></tr>';
      if (collapsed) continue;
      for (const r of g.rows) {
        html += '<tr class="row"><td class="cli">' + esc(r.client) + '</td>';
        if (state.view === 'dates') {
          html += '<td class="date">' + fmtDate(r.mpl) + '</td>'
                + '<td class="date">' + fmtDate(r.mpc) + '</td>'
                + '<td class="date">' + fmtDate(r.maxcert) + '</td>';
        } else {
          for (const mk of MONTHS) {
            const v = r.m[mk.key];
            html += '<td class="mnum' + (v ? '' : ' zero') + '">' + (v || '') + '</td>';
          }
        }
        html += '</tr>';
      }
    }
    body.innerHTML = html;

    for (const tr of body.querySelectorAll('tr.grp')) {
      tr.addEventListener('click', () => {
        const p = tr.dataset.p;
        if (state.collapsed.has(p)) state.collapsed.delete(p); else state.collapsed.add(p);
        render();
      });
    }
    $('toggle-all').textContent = state.collapsed.size >= groups.length ? 'Expand all' : 'Collapse all';
  }

  render();
})();
</script>
</body>
</html>
